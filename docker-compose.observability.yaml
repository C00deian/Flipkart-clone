services:
  loki:
    image: grafana/loki:2.9.3
    container_name: flipkartclone-loki-1
    command: -config.file=/etc/loki/config.yaml
    ports:
      - "3100:3100"
    volumes:
      - ./observability/loki-config.yaml:/etc/loki/config.yaml:ro
    restart: unless-stopped

  promtail:
    image: grafana/promtail:2.9.3
    container_name: flipkartclone-promtail-1
    command: -config.file=/etc/promtail/config.yaml
    volumes:
      - ./observability/promtail-config.yaml:/etc/promtail/config.yaml:ro
      # If services run on host (IntelliJ/terminal), scrape JSON log files from repo root logs/.
      - ./logs:/var/log/app:ro
      # Read Docker container logs from the host.
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.3
    container_name: flipkartclone-grafana-1
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - loki
    restart: unless-stopped

volumes:
  grafana-data:
