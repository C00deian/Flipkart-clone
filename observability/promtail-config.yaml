server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: 'compose_service'
    pipeline_stages:
      # Your apps already log JSON (LogstashEncoder). Parse it so labels/fields are queryable.
      - json:
          expressions:
            service: service
            level: level
            logger_name: logger_name
            traceId: traceId
            userId: userId
            method: method
            path: path
      - labels:
          service:
          level:
          traceId:

  - job_name: app_files
    static_configs:
      - targets:
          - localhost
        labels:
          job: app_files
          __path__: /var/log/app/*/*.log
    pipeline_stages:
      - json:
          expressions:
            service: service
            level: level
            logger_name: logger_name
            traceId: traceId
            userId: userId
            method: method
            path: path
      - labels:
          service:
          level:
          traceId:
